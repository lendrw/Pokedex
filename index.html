<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Links-->

    <link rel="icon" href="favicons/websiteplanet.com-favicons/favicons/favicon-16x16.png">
    <link rel="stylesheet" href="css/styles.css">

    <!--Main JS-->

    <script defer src="js/main.js"></script>

    <title>Pokédex</title>
</head>
<body>
    <main>
        <img src="#" alt="pokemon" class="pokemon_image">

        <h1 class="pokemon_data">
            <span class="pokemon_number"></span> -
            <span class="pokemon_name"></span>
        </h1>

        <form class="form">
            <input 
            type="search"
            class="input_search"
            placeholder="Name or Number"
            required
            />             
        </form>              
        
        <div class="buttons">
            <button class="button btn-prev">&laquo; Prev</button>
            <button class="button btn-next">Next &raquo;</button>
        </div>

        <img src="img/pokedex.png" alt="pokedex" class="pokedex">
    </main>
</body>
</html>
